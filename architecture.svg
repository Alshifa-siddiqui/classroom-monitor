<svg viewBox="0 0 980 760" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif">
<title>Real-Time AI Classroom Monitoring System architecture</title>
<rect x="0" y="0" width="980" height="760" fill="#12151c"/>
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#8b93a3"/></marker>
<marker id="arrA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#5b8def"/></marker>
</defs>
<style>
.box{fill:#1b1f29;stroke:#2a2f3a;stroke-width:1.5;}
.lane{fill:none;stroke:#2a2f3a;stroke-width:1.5;stroke-dasharray:4 4;}
.acc{fill:#1b1f29;stroke:#5b8def;stroke-width:1.5;}
.t{fill:#e6e9ef;font-size:13px;font-weight:600;}
.s{fill:#8b93a3;font-size:11px;}
.lbl{fill:#8b93a3;font-size:11px;font-style:italic;}
.hd{fill:#8b93a3;font-size:11px;font-weight:700;letter-spacing:.08em;}
.flow{stroke:#8b93a3;stroke-width:1.5;fill:none;}
.flowA{stroke:#5b8def;stroke-width:1.5;fill:none;}
</style>
<text x="40" y="34" class="hd">CLIENT  ·  BROWSER</text>
<rect x="40" y="44" width="900" height="86" rx="10" class="lane"/>
<rect x="56" y="60" width="200" height="54" rx="8" class="box"/><text x="68" y="82" class="t">React SPA (Vite)</text><text x="68" y="100" class="s">JWT in localStorage</text>
<rect x="272" y="60" width="300" height="54" rx="8" class="box"/><text x="284" y="82" class="t">Staff UI · role-gated tabs</text><text x="284" y="100" class="s">Dashboard · Students · Reports · Analytics · Users</text>
<rect x="588" y="60" width="160" height="54" rx="8" class="box"/><text x="600" y="82" class="t">Student portal</text><text x="600" y="100" class="s">own history only</text>
<rect x="764" y="60" width="160" height="54" rx="8" class="box"/><text x="776" y="82" class="t">Login / Sign-up</text><text x="776" y="100" class="s">admin code opt.</text>
<line x1="490" y1="130" x2="490" y2="166" class="flow" marker-end="url(#arr)"/>
<text x="500" y="152" class="lbl">HTTPS REST  +  WSS WebSocket   (Bearer JWT)</text>
<text x="40" y="192" class="hd">BACKEND  ·  FastAPI  (single process, Uvicorn worker)</text>
<rect x="40" y="202" width="900" height="338" rx="10" class="lane"/>
<rect x="56" y="218" width="868" height="44" rx="8" class="box"/><text x="68" y="240" class="t">Middleware</text><text x="68" y="255" class="s">CORS all-list · JWT auth + RBAC (student·viewer·teacher·admin) · per-IP rate limit · request log · global error handler</text>
<rect x="56" y="278" width="404" height="246" rx="10" class="lane"/><text x="70" y="298" class="hd">REST SERVICES</text>
<rect x="72" y="308" width="180" height="46" rx="8" class="box"/><text x="84" y="330" class="t">auth_routes</text><text x="84" y="346" class="s">login·signup·users</text>
<rect x="264" y="308" width="180" height="46" rx="8" class="box"/><text x="276" y="330" class="t">students + enroll</text><text x="276" y="346" class="s">CRUD·search·account</text>
<rect x="72" y="364" width="180" height="46" rx="8" class="box"/><text x="84" y="386" class="t">reports</text><text x="84" y="402" class="s">CSV · PDF · JSON</text>
<rect x="264" y="364" width="180" height="46" rx="8" class="box"/><text x="276" y="386" class="t">analytics + trends</text><text x="276" y="402" class="s">TTL-cached</text>
<rect x="72" y="420" width="372" height="46" rx="8" class="box"/><text x="84" y="442" class="t">profile · attendance · alerts · audit log</text><text x="84" y="458" class="s">per-student stats · entry/exit · thresholds · trail</text>
<rect x="72" y="476" width="372" height="38" rx="8" class="box"/><text x="84" y="499" class="t">WebSocket manager (broadcast · evict)</text>
<rect x="476" y="278" width="448" height="246" rx="10" class="lane" stroke="#5b8def"/><text x="490" y="298" class="hd">AI VISION PIPELINE  (background thread, OpenCV DNN)</text>
<rect x="492" y="308" width="190" height="40" rx="7" class="acc"/><text x="504" y="333" class="t">① YuNet detect (+landmarks)</text>
<rect x="704" y="308" width="200" height="40" rx="7" class="acc"/><text x="716" y="333" class="t">② IoU tracker + re-ID</text>
<rect x="492" y="356" width="190" height="40" rx="7" class="acc"/><text x="504" y="381" class="t">③ SFace identity (128-d)</text>
<rect x="704" y="356" width="200" height="40" rx="7" class="acc"/><text x="716" y="381" class="t">④ FER+ emotion</text>
<rect x="492" y="404" width="190" height="40" rx="7" class="acc"/><text x="504" y="429" class="t">⑤ Attention score</text>
<rect x="704" y="404" width="200" height="40" rx="7" class="acc"/><text x="716" y="429" class="t">⑥ Overlay + attendance</text>
<rect x="492" y="452" width="412" height="40" rx="7" class="acc"/><text x="504" y="477" class="t">⑦ Broadcast frames + analytics + alerts → WebSocket</text>
<line x1="682" y1="328" x2="704" y2="328" class="flowA" marker-end="url(#arrA)"/>
<line x1="592" y1="348" x2="592" y2="356" class="flowA" marker-end="url(#arrA)"/>
<line x1="682" y1="376" x2="704" y2="376" class="flowA" marker-end="url(#arrA)"/>
<line x1="592" y1="396" x2="592" y2="404" class="flowA" marker-end="url(#arrA)"/>
<line x1="682" y1="424" x2="704" y2="424" class="flowA" marker-end="url(#arrA)"/>
<line x1="700" y1="444" x2="660" y2="452" class="flowA" marker-end="url(#arrA)"/>
<text x="492" y="513" class="s">webcam / RTSP → frame grabber (latest-frame, auto-reconnect, idle throttle)</text>
<line x1="258" y1="540" x2="258" y2="576" class="flow" marker-end="url(#arr)"/>
<line x1="270" y1="576" x2="270" y2="540" class="flow" marker-end="url(#arr)"/>
<text x="40" y="602" class="hd">PERSISTENCE  ·  SQLAlchemy</text>
<rect x="40" y="612" width="900" height="120" rx="10" class="lane"/>
<text x="56" y="634" class="t">SQLite (default)  /  PostgreSQL (production)</text>
<rect x="56" y="646" width="135" height="32" rx="6" class="box"/><text x="66" y="666" class="s">users</text>
<rect x="199" y="646" width="135" height="32" rx="6" class="box"/><text x="209" y="666" class="s">students</text>
<rect x="342" y="646" width="135" height="32" rx="6" class="box"/><text x="352" y="666" class="s">face_embeddings</text>
<rect x="485" y="646" width="135" height="32" rx="6" class="box"/><text x="495" y="666" class="s">sessions</text>
<rect x="628" y="646" width="135" height="32" rx="6" class="box"/><text x="638" y="666" class="s">attendance</text>
<rect x="771" y="646" width="150" height="32" rx="6" class="box"/><text x="781" y="666" class="s">attention_logs</text>
<rect x="56" y="686" width="135" height="32" rx="6" class="box"/><text x="66" y="706" class="s">emotion_logs</text>
<rect x="199" y="686" width="135" height="32" rx="6" class="box"/><text x="209" y="706" class="s">alerts</text>
<rect x="342" y="686" width="135" height="32" rx="6" class="box"/><text x="352" y="706" class="s">audit_logs</text>
<text x="495" y="706" class="s">9 tables · composite indexes on (session_id, timestamp)</text>
</svg>
